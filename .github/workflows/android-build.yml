name: Android APK Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  debug:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35 components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        id: build_debug
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean :app:assembleDebug --stacktrace --info --console=plain 2>&1 | tee gradle-debug.log

      - name: Upload debug Gradle logs and reports
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            app/build/reports/**
            app/build/outputs/logs/**
            gradle-debug.log
          if-no-files-found: ignore
          retention-days: 14

      - name: List build outputs
        run: |
          echo "=== app/build ==="
          find app/build -maxdepth 8 -type f | sort || true

      - name: Detect debug APK
        id: debug_apk
        run: |
          DEBUG_APK=$(find app/build -type f \( -name "*debug*.apk" -o -name "*.apk" \) | sort | head -n 1)
          if [ -n "$DEBUG_APK" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$DEBUG_APK" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload debug APK artifact
        if: ${{ steps.debug_apk.outputs.exists == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: LibreDisplay-debug
          path: ${{ steps.debug_apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Fail if debug APK was not created
        if: ${{ steps.debug_apk.outputs.exists != 'true' }}
        run: |
          echo "=== Gradle failure summary (debug) ==="
          grep -nE "^FAILURE:|What went wrong:|Execution failed for task|A problem occurred" gradle-debug.log || true
          echo "=== Last 120 lines of gradle-debug.log ==="
          tail -n 120 gradle-debug.log || true
          echo "Debug APK was not created. Check gradle-debug.log and the gradle-reports artifact."
          exit 1

  release:
    name: Build release APK (optional)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35 components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build release APK
        id: build_release
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean :app:assembleRelease --stacktrace --info --console=plain 2>&1 | tee gradle-release.log

      - name: Upload release Gradle logs and reports
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports-release
          path: |
            app/build/reports/**
            app/build/outputs/logs/**
            gradle-release.log
          if-no-files-found: ignore
          retention-days: 14

      - name: List release build outputs
        run: |
          echo "=== app/build ==="
          find app/build -maxdepth 8 -type f | sort || true

      - name: Detect release APK
        id: release_apk
        run: |
          RELEASE_APK=$(find app/build -type f \( -path "*/release/*.apk" -o -name "*release*.apk" \) | sort | head -n 1)
          if [ -n "$RELEASE_APK" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$RELEASE_APK" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect signing configuration
        id: signing
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ] && [ -n "$RELEASE_KEY_ALIAS" ] && [ -n "$RELEASE_KEYSTORE_PASSWORD" ] && [ -n "$RELEASE_KEY_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare keystore (optional)
        if: ${{ steps.release_apk.outputs.exists == 'true' && steps.signing.outputs.enabled == 'true' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Sign release APK (optional)
        if: ${{ steps.release_apk.outputs.exists == 'true' && steps.signing.outputs.enabled == 'true' }}
        env:
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_APK_PATH: ${{ steps.release_apk.outputs.path }}
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/zipalign" -v -p 4 \
            "$RELEASE_APK_PATH" \
            app/build/outputs/apk/release/app-release-aligned.apk

          "$ANDROID_HOME/build-tools/35.0.0/apksigner" sign \
            --ks release-keystore.jks \
            --ks-key-alias "$RELEASE_KEY_ALIAS" \
            --ks-pass pass:"$RELEASE_KEYSTORE_PASSWORD" \
            --key-pass pass:"$RELEASE_KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-aligned.apk

      - name: Upload signed release APK artifact (optional)
        if: ${{ steps.release_apk.outputs.exists == 'true' && steps.signing.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: LibreDisplay-release-signed
          path: app/build/outputs/apk/release/app-release-signed.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release unsigned APK artifact
        if: ${{ steps.release_apk.outputs.exists == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: LibreDisplay-release-unsigned
          path: ${{ steps.release_apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Mark release build as skipped if APK was not created
        if: ${{ steps.release_apk.outputs.exists != 'true' }}
        run: echo "Release APK was not created. Debug APK may still be available."

